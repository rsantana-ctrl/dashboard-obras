<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF - Dashboard de Obras</title>
    <style>
        /* Estilo para ocupar a tela toda com a planilha */
        body { 
            font-family: sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #f4f4f4; 
            overflow: hidden; /* Remove barras de rolagem duplas */
        }
        .container { 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        h2 { 
            background-color: #2c3e50; 
            color: white; 
            margin: 0; 
            padding: 15px; 
            text-align: center; 
            font-size: 1.2em;
        }
        iframe { 
            flex-grow: 1; 
            border: none; 
            width: 100%; 
            height: 100%; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Memorial de Cálculo e Curva ABC - Iluminação Área Externa</h2>
        
        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRHi2SEi6xzzFkKofJp6jOzWoA0epH2IfvsOpuLA6_rRtdv9ZX90XuO7dAMyTxzAw/pubhtml?widget=true&amp;headers=false"></iframe>
    </div>
</body>
</html>
