<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Obras</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background-color: #1a73e8;
            color: white;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h2 {
            margin: 0;
            font-size: 1.5rem;
        }
        .container {
            flex-grow: 1;
            width: 100%;
            padding: 10px;
        }
        iframe {
            border: 1px solid #ccc;
            border-radius: 8px;
            width: 100%;
            height: 100%;
            background-color: white;
        }
    </style>
</head>
<body>

    <header>
        <h2>Memorial de Cálculo - Dashboard de Obras</h2>
    </header>

    <div class="container">
        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTEtXxkyKdlr_u-9lkOy5dYCEx-riNJ1-vYw_OHNEy6v34W_ti_XEUjAJ36Cc3yMKDhh9J88EMzSZvI/pubhtml?widget=true&amp;headers=false&amp;chrome=false"></iframe>
    </div>

</body>
</html>
